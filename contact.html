<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Me</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #7F00FF, #E100FF);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* HEADER */
header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    backdrop-filter: blur(6px);
    z-index: 1000;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 25px;
}

nav ul li a {
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

nav ul li a:hover {
    color: #ffd6ff;
}

/* TITLE */
h1 {
    margin: 40px 0;
    text-align: center;
}

/* CONTACT SECTION */
.contact-container {
    max-width: 700px;
    width: 90%;
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.contact-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.contact-info {
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.8;
}

.contact-info a {
    color: #ffd6ff;
    text-decoration: none;
}

.contact-info a:hover {
    text-decoration: underline;
}

/* FORM STYLING */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

form input, form textarea {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

form input::placeholder, form textarea::placeholder {
    color: #555;
}

form textarea {
    resize: vertical;
    min-height: 100px;
}

form button {
    background: #ffd6ff;
    color: #7F00FF;
    font-weight: bold;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

form button:hover {
    background: #ffb3ff;
}

</style>
</head>

<body>

<header>
    <div class="logo">𝐀𝓼ⓗ𝕃𝑒ץ</div>
    <nav>

            <li><a href="skills.html">Skills</a></li>
            <li><a href="work.html">Achievements</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<h1>𝐂𝐨𝐧𝐭𝐚𝐜𝐭 𝐌𝐞</h1>


<div class="contact-container">
    
    <h2>𝐆𝐞𝐭 𝐢𝐧 𝐓𝐨𝐮𝐜𝐡</h2>
    
    
    <div class="contact-info">

</div>

</body>
</html>
